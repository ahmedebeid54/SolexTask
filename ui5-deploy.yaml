# yaml-language-server: $schema=https://ui5.github.io/cli/schema/ui5.yaml.json
# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: com.solex.training.northwindproducts
type: application
resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: comsolextrainingnorthwindproducts
        relativePaths: true
        additionalFiles:
          - xs-app.json
